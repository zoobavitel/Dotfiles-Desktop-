# Setup monitors
# See https://wiki.hyprland.org/configuring/monitors/
# Desktop configuration - single monitor setup
monitor=desc:LG Electronics 27GK750F,1920x1080@239.76,0x0,1
monitor=HDMI-A-1,640x480@60,1920x0,1.0
monitor=,preferred,auto,auto

# See https://wiki.hyprland.org/Configuring/Keywords/ for more

$files = thunar
$browser = firefox
$editor = /opt/cursor/Cursor-2.0.34-x86_64.AppImage

# Execute your favorite apps at launch
exec-once = ~/.config/hypr/xdg-portal-hyprland
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = awww-daemon &
exec-once = awww img ~/Pictures/Wallpapers/teal98.png
exec-once = waybar
exec-once = mako
exec-once = blueman-applet
exec-once = nm-applet --indicator
exec-once = wl-paste --watch cliphist store
exec-once = libinput-gestures
exec = gsettings set org.gnome.desktop.interface gtk-theme "Chicago95"
exec = gsettings set org.gnome.desktop.interface icon-theme "SE98"
exec = gsettings set org.gnome.desktop.interface cursor-theme "Chicago95_Cursor_White"

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = altwin:swap_alt_win
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = yes
        scroll_factor = 0.5
    }

    sensitivity = 0  # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 3
    gaps_out = 7
    border_size = 2
    #col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.active_border=rgb(cdd6f4)
    col.inactive_border = rgba(595959aa)

    layout = dwindle
}

# FIXED: cursor_inactive_timeout moved to cursor section in 0.45+
cursor {
    inactive_timeout = 5
}

misc {
    disable_hyprland_logo = yes
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 5
    
    blur {
        enabled = true
        size = 10
        passes = 2
        ignore_opacity = true
        # REMOVED: new_optimizations is deprecated (always enabled now)
    }

    layerrule = blur true, match:namespace lockscreen
    layerrule = blur true, match:namespace waybar

    # FIXED: Shadow options moved to shadow subsection in 0.45+
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more
    bezier = myBezier, 0.10, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier, slide
    animation = windowsOut, 1, 7, myBezier, slide
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    # FIXED: new_is_master is deprecated, use new_status instead
    new_status = master
}

# FIXED: Gesture system completely reworked in 0.51
# Old options workspace_swipe, workspace_swipe_fingers, workspace_swipe_min_fingers are REMOVED
# See https://wiki.hypr.land/Configuring/Gestures/ for more
gestures {
    # Legacy options still supported for customization
    workspace_swipe_distance = 150
    workspace_swipe_invert = false
    
    # NEW 0.51 syntax: Use gesture keyword instead of workspace_swipe
    # Format: gesture = [fingers], [direction], [action]
    gesture = 3, horizontal, workspace
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

# Window Rules
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
windowrule = float on, opacity 0.8 0.8, match:class ^(pavucontrol)$
windowrule = float on, opacity 0.8 0.8, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, animation popin, match:class ^(chromium)$
windowrule = float on, animation popin, opacity 0.8 0.8, match:class ^(thunar)$
windowrule = float on, match:title ^(btop)$
windowrule = float on, match:title ^(update-sys)$
windowrule = opacity 0.9 0.8, match:class ^(Code)$
#windowrulev2 = opacity 0.9 0.8, class:^(firefox)$

# More windowrules v2
# rules below would make the specific app transparent
#windowrule = opacity 0.8 0.8, match:class ^(kitty)$
#windowrule = animation popin, match:class ^(kitty)$, match:title ^(update-sys)$
# Windows 98 style for kitty - no rounded corners, no transparency
windowrule = opacity 1.0 override 1.0 override, match:class ^(kitty)$
windowrule = rounding 0, match:class ^(kitty)$
windowrule = border_color rgb(000080), match:class ^(kitty)$, match:focus 1
windowrule = border_color rgb(808080), match:class ^(kitty)$, match:focus 0
windowrule = opacity 0.8 0.8, match:class ^(org.kde.dolphin)$
windowrule = move (cursor_x+(-(monitor_w*0.03))) (cursor_y+(-(monitor_h*1.05))), no_anim on, match:class ^(wofi)$
windowrule = opacity 0.8 0.8, match:class ^(org.qbittorrent.qBittorrent)$
windowrule = opacity 0.9 0.9, match:class ^(Spotify)$
windowrule = opacity 0.9 0.9, match:class ^(thunderbird)$


# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, K, exec, kitty  #open the terminal
bind = $mainMod, Q, killactive, # close the active window
bind = $mainMod, L, exec, hyprlock  # Lock the screen
bind = $mainMod, M, exec, wlogout --protocol layer-shell # show the logout window
bind = $mainMod SHIFT, M, exit, # Exit Hyprland all together no (force quit Hyprland)
bind = $mainMod, E, exec, thunar # Show the graphical file browser
bind = $mainMod, C, exec, $editor # Open code editor (Cursor)
bind = $mainMod, V, togglefloating, # Allow a window to float
bind = $mainMod, SPACE, exec, wofi # Show the graphical app launcher
bind = $mainMod, P, pseudo, # qdwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, S, exec, grim -g "$(slurp)" - | swappy -f - # take a screenshot
bind = $mainMod, U, exec, cliphist list | wofi -dmenu | cliphist decode | wl-copy # open clipboard manager

# Audio controls for PipeWire (using wpctl)
# If you want to add volume control keybinds, use these:
# bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
# bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
# bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
# bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

#Resize submap binds
bind=$mainMod,R,submap,resize
submap=resize
binde=,right,resizeactive,30 0
binde=SHIFT,right,resizeactive,10 0
binde=,left,resizeactive,-30 0
binde=SHIFT,left,resizeactive,-10 0
binde=,up,resizeactive,0 -30
binde=SHIFT,up,resizeactive,0 -10
binde=,down,resizeactive,0 30
binde=SHIFT,down,resizeactive,0 10
bindrt=$mainMod,R,submap,reset 
submap=reset

#Moving windows binds
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf
source = ~/.config/hypr/env_var.conf

#Custom
bind = $mainMod, F, fullscreen, 1
bind = $mainMod SHIFT, F, fullscreen


plugin {
	hyprbars {
		enabled = true
		bar_height = 20
		bar_color = rgba(000080ff)
		col.text = rgb(ffffff)
		bar_text_size = 11
		bar_text_font = Courier New
		bar_precedence_over_border = true
		
		# Buttons: right side, Win98 style (close, maximize, minimize)
        	hyprbars-button = rgb(c0c0c0), 14, 󰖭, hyprctl dispatch killactive
      		hyprbars-button = rgb(c0c0c0), 14, 󰖯, hyprctl dispatch fullscreen 1
 	       	hyprbars-button = rgb(c0c0c0), 14, 󰖰, hyprctl dispatch movetoworkspacesilent special
    }
}
