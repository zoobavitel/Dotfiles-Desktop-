# vim:fileencoding=utf-8:foldmethod=marker

# Windows 98 Terminal Look
font_family           Courier New
bold_font             auto
italic_font           auto  
bold_italic_font      auto
font_size             11

cursor_shape          block
cursor_blink_interval 0

# Window styling - minimal padding for that classic look
window_padding_width  2
window_border_width   1pt
active_border_color   #000080
inactive_border_color #808080

# No window margin
window_margin_width   0

# Mappings
map ctrl+shift+h previous_tab
map ctrl+shift+l next_tab
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9

# Scroll
map shift+up         scroll_line_up
map shift+page_up    scroll_page_up
map shift+down       scroll_line_down
map shift+page_down  scroll_page_down

# Tab bar - Windows 98 style
tab_bar_style         separator
tab_bar_background    #000080
tab_bar_margin_color  #000080
active_tab_foreground #ffffff
active_tab_background #000080
inactive_tab_foreground #c0c0c0
inactive_tab_background #808080
tab_separator         " | "
tab_title_template    "{index}: {title.replace('krypton@archlinux:', '󰋜 ')}"

# Disable audio bell
enable_audio_bell     no

# Load Windows 98 color theme
include win98-theme.conf
